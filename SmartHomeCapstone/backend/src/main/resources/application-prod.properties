spring.application.name=backend

# PostgreSQL Database Configuration (Render will provide DATABASE_URL)
# Render provides DATABASE_URL in format: postgres://user:password@host:port/database
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# PostgreSQL specific settings
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Connection pool settings (HikariCP - Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Logging (reduced for production)
logging.level.com.smarthome.backend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# JWT Configuration (use environment variable in production)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Server configuration
server.port=${PORT:8080}